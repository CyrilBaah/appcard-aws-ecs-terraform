name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm infrastructure destruction'
        required: true
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  destroy-infra:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy'
    concurrency:
      group: terraform-destroy-${{ github.ref }}
      cancel-in-progress: false
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_terraform_state_bucket: ${{ vars.TF_STATE_BUCKET }}
      TF_VAR_terraform_state_key: ${{ vars.TF_STATE_KEY }}
      TF_VAR_terraform_state_region: ${{ secrets.AWS_REGION }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_create_oidc_provider: false
      TF_VAR_create_github_role: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ vars.TF_VERSION }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Stop ECS service for faster cleanup
      run: |
        SERVICE_STATUS=$(aws ecs describe-services \
          --cluster ${{ vars.PROJECT_NAME }}-cluster \
          --services ${{ vars.PROJECT_NAME }}-service \
          --query 'services[0].status' \
          --output text 2>/dev/null || echo "MISSING")

        if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
          aws ecs update-service \
            --cluster ${{ vars.PROJECT_NAME }}-cluster \
            --service ${{ vars.PROJECT_NAME }}-service \
            --desired-count 0
        else
          echo "ECS service is not ACTIVE (status: $SERVICE_STATUS). Skipping scale-down."
        fi
        sleep 30

    - name: Terraform Init
      run: |
        cd terraform
        terraform init -input=false \
          -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
          -backend-config="key=${{ vars.TF_STATE_KEY }}" \
          -backend-config="region=${{ secrets.AWS_REGION }}" \
          -backend-config="encrypt=true"

    - name: Terraform Destroy
      run: |
        cd terraform
        terraform destroy -input=false -auto-approve

    - name: Verify ECR cleanup
      run: |
        aws ecr describe-repositories --repository-names ${{ vars.PROJECT_NAME }} || echo "ECR repository cleaned up"

    - name: Cleanup confirmation
      run: |
        echo "Infrastructure destroyed successfully!"
        echo "AWS resources have been cleaned up to avoid charges"
