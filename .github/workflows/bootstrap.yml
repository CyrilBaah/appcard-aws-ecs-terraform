name: Bootstrap Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "bootstrap" to create S3 backend and GitHub OIDC'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'bootstrap'
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_terraform_state_bucket: ${{ vars.TF_STATE_BUCKET }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_create_oidc_provider: true
      TF_VAR_create_github_role: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ vars.TF_VERSION }}

    - name: Configure AWS credentials (temporary)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Bootstrap S3 backend and OIDC
      run: |
        cd terraform/bootstrap
        terraform init -input=false
        terraform fmt -check -recursive
        terraform validate

        STATE_BUCKET="${{ vars.TF_STATE_BUCKET }}"
        OWNED_BUCKET=$(aws s3api list-buckets --query "Buckets[?Name=='$STATE_BUCKET'].Name | [0]" --output text)

        if terraform state show module.bootstrap.aws_s3_bucket.terraform_state >/dev/null 2>&1; then
          echo "State bucket already tracked in Terraform state"
        elif [ "$OWNED_BUCKET" = "$STATE_BUCKET" ]; then
          echo "State bucket exists in this account; importing"
          terraform import module.bootstrap.aws_s3_bucket.terraform_state "$STATE_BUCKET"
        elif aws s3api head-bucket --bucket "$STATE_BUCKET" >/dev/null 2>&1; then
          echo "State bucket exists but is not owned by this account."
          echo "Set a unique TF_STATE_BUCKET and rerun bootstrap."
          exit 1
        else
          echo "State bucket does not exist; Terraform will create it"
        fi

        OIDC_ARN="arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:oidc-provider/token.actions.githubusercontent.com"
        ROLE_NAME="${{ vars.PROJECT_NAME }}-github-actions"

        if terraform state show module.github_oidc.aws_iam_openid_connect_provider.github[0] >/dev/null 2>&1; then
          echo "OIDC provider already tracked in Terraform state"
        elif aws iam get-open-id-connect-provider --open-id-connect-provider-arn "$OIDC_ARN" >/dev/null 2>&1; then
          terraform import module.github_oidc.aws_iam_openid_connect_provider.github[0] "$OIDC_ARN"
        else
          echo "OIDC provider not found in AWS; Terraform will create it"
        fi

        if terraform state show module.github_oidc.aws_iam_role.github_actions[0] >/dev/null 2>&1; then
          echo "GitHub Actions role already tracked in Terraform state"
        elif aws iam get-role --role-name "$ROLE_NAME" >/dev/null 2>&1; then
          terraform import module.github_oidc.aws_iam_role.github_actions[0] "$ROLE_NAME"
        else
          echo "GitHub Actions role not found in AWS; Terraform will create it"
        fi

        terraform plan -input=false
        terraform apply -auto-approve

    - name: Show bootstrap info
      run: |
        cd terraform/bootstrap
        S3_BUCKET=$(terraform output -raw s3_bucket_name)
        ROLE_ARN=$(terraform output -raw github_actions_role_arn)
        
        echo "Bootstrap complete!"
        echo "S3 Bucket: $S3_BUCKET"
        echo "GitHub Role ARN: ${ROLE_ARN//${{ secrets.AWS_ACCOUNT_ID }}/***MASKED***}"
        echo ""
        echo "IMPORTANT: Remove AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY secrets now!"
        echo "All future workflows will use OIDC authentication"
